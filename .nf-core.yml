repository_type: pipeline

nf_core_version: 4.0.2

lint:
  files_unchanged:
    - CODE_OF_CONDUCT.md
    - assets/nf-core-genoflu-nf_logo_light.png
    - docs/images/nf-core-genoflu-nf_logo_light.png
    - docs/images/nf-core-genoflu-nf_logo_dark.png
    - .github/ISSUE_TEMPLATE/bug_report.yml
    - .github/PULL_REQUEST_TEMPLATE.md
    - assets/email_template.txt
    - docs/README.md
    - assets/sendmail_template.txt
  nextflow_config:
    - manifest.name
    - manifest.homePage
  multiqc_config: false
  files_exist:
    - conf/igenomes.config
    - conf/igenomes_ignored.config
    - CHANGELOG.md
    - CODE_OF_CONDUCT.md
    - assets/nf-core-genoflu-nf_logo_light.png
    - docs/images/nf-core-genoflu-nf_logo_light.png
    - docs/images/nf-core-genoflu-nf_logo_dark.png
    - .github/ISSUE_TEMPLATE/config.yml
    - .github/workflows/awstest.yml
    - .github/workflows/awsfulltest.yml
    - .prettierignore
    - .prettierrc.yml
    - assets/multiqc_config.yml
    - CITATIONS.md

template:
  org: BCCDC-PHL
  name: genoflu-nf
  description: Run GenoFlu
  author: Dan Fornika
  version: 1.0.0dev
  force: false
  outdir: .
  skip_features:
    - igenomes
    - code_linters
    - citations
    - multiqc
    - changelog
    - slackreport
  is_nfcore: false
